<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evnt — Event Management</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080d;
  --surface:#0e1018;
  --surface2:#161821;
  --surface3:#1e2030;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --accent:#c8f05a;
  --accent2:#a8d040;
  --accent-soft:rgba(200,240,90,0.1);
  --accent-glow:rgba(200,240,90,0.15);
  --text:#eeeef0;
  --text2:#9a9aad;
  --text3:#5a5a70;
  --danger:#ff5f6d;
  --success:#4ade80;
  --info:#60a5fa;
  --warn:#fbbf24;
  --radius:14px;
  --radius-lg:20px;
  --radius-sm:9px;
  --radius-pill:999px;
  font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.serif{font-family:'Fraunces',serif}

/* Subtle noise texture overlay */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ---- Topbar ---- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;
  background:rgba(7,8,13,0.85);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.5px;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}
.topnav{display:flex;gap:6px;align-items:center}

/* ---- Buttons ---- */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);background:transparent;
  color:var(--text2);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;
  letter-spacing:0.01em;
}
.btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-accent{
  background:var(--accent);color:#0a0f02;border-color:var(--accent);font-weight:600;
  box-shadow:0 0 20px var(--accent-glow);
}
.btn-accent:hover{background:var(--accent2);border-color:var(--accent2);color:#0a0f02;box-shadow:0 0 28px var(--accent-glow)}
.btn-ghost{border-color:transparent;background:transparent}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border)}
.btn-danger{border-color:rgba(255,95,109,0.3);color:var(--danger)}
.btn-danger:hover{background:rgba(255,95,109,0.1)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-success{background:var(--success);color:#021409;border-color:var(--success);font-weight:600}
.btn-success:hover{opacity:.88}
.btn-icon{padding:8px;width:36px;height:36px;justify-content:center}

/* ---- Layout ---- */
.main{flex:1;padding:40px 32px;max-width:1200px;margin:0 auto;width:100%}

/* ---- Pages ---- */
.page{display:none;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ---- Hero ---- */
.hero{
  text-align:center;padding:80px 20px 60px;
  position:relative;
}
.hero::before{
  content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse at center, rgba(200,240,90,0.07) 0%, transparent 70%);
  pointer-events:none;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 16px;
  background:var(--accent-soft);
  border:1px solid rgba(200,240,90,0.2);
  border-radius:var(--radius-pill);
  font-size:12px;font-weight:500;color:var(--accent);
  margin-bottom:28px;letter-spacing:0.03em;
}
.hero-badge-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero h1{
  font-size:clamp(42px,7vw,72px);font-weight:600;
  line-height:1.05;margin-bottom:20px;
  letter-spacing:-2px;
}
.hero h1 em{color:var(--accent);font-style:italic;font-family:'Fraunces',serif}
.hero p{font-size:17px;color:var(--text2);max-width:500px;margin:0 auto 40px;line-height:1.7;font-weight:300}
.hero-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ---- Stats bar ---- */
.stats-bar{
  display:grid;grid-template-columns:repeat(3,1fr);
  background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;margin-bottom:48px;
}
.stat-item{
  padding:24px 28px;text-align:center;
  position:relative;
}
.stat-item+.stat-item::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:1px;background:var(--border);
}
.stat-num{
  font-family:'Fraunces',serif;font-size:32px;font-weight:600;
  color:var(--accent);letter-spacing:-1px;
}
.stat-label{font-size:12px;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:0.1em;font-weight:500}

/* ---- Section ---- */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.section-title{font-size:18px;font-weight:500;letter-spacing:-0.3px}
.section-sub{font-size:13px;color:var(--text3);font-weight:400}

/* ---- Event Grid ---- */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
.event-card{
  background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;transition:all .22s cubic-bezier(0.4,0,0.2,1);
  cursor:pointer;display:flex;flex-direction:column;
  position:relative;
}
.event-card:hover{
  border-color:rgba(200,240,90,0.2);
  transform:translateY(-3px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(200,240,90,0.1);
}
.event-thumb{
  height:150px;display:flex;align-items:center;justify-content:center;
  font-size:52px;position:relative;overflow:hidden;
}
.event-thumb-glow{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, transparent 70%);
}
.event-category-badge{
  position:absolute;top:12px;left:12px;
  padding:4px 11px;border-radius:var(--radius-pill);
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;
  backdrop-filter:blur(8px);
}
.cat-music{background:rgba(130,100,255,0.25);color:#b8a0ff;border:1px solid rgba(130,100,255,0.3)}
.cat-tech{background:rgba(96,165,250,0.2);color:#93c5fd;border:1px solid rgba(96,165,250,0.3)}
.cat-arts{background:rgba(244,114,182,0.2);color:#f9a8d4;border:1px solid rgba(244,114,182,0.3)}
.cat-food{background:rgba(251,191,36,0.2);color:#fcd34d;border:1px solid rgba(251,191,36,0.3)}
.cat-sports{background:rgba(74,222,128,0.2);color:#86efac;border:1px solid rgba(74,222,128,0.3)}
.cat-business{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(200,240,90,0.3)}
.event-body{padding:18px;flex:1;display:flex;flex-direction:column;gap:10px}
.event-title{font-size:15px;font-weight:600;line-height:1.35;letter-spacing:-0.1px}
.event-meta{display:flex;flex-direction:column;gap:5px}
.event-meta-row{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.meta-icon{width:16px;height:16px;opacity:0.5;flex-shrink:0}
.event-footer{
  padding:14px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.event-price{font-weight:700;font-size:16px;color:var(--accent);font-family:'Fraunces',serif}
.event-price.free{color:var(--success)}
.event-seats{font-size:12px;color:var(--text3);font-weight:500}
.seats-low{color:var(--danger)!important}
.capacity-bar{height:3px;background:var(--border2);border-radius:99px;overflow:hidden}
.capacity-fill{height:100%;border-radius:99px;transition:width .3s}

/* ---- Modal ---- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:200;display:none;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--radius-lg);
  width:100%;max-width:540px;max-height:90vh;overflow-y:auto;
  position:relative;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}
.modal-header{
  padding:22px 26px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.modal-title{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.modal-close{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text3);cursor:pointer;font-size:16px;line-height:1;
  padding:0;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.modal-close:hover{color:var(--text);background:var(--surface3)}
.modal-body{padding:26px}
.modal-footer{padding:18px 26px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* ---- Forms ---- */
.form-group{margin-bottom:20px}
.form-label{
  display:block;font-size:12px;font-weight:600;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text3);margin-bottom:8px;
}
.form-input,.form-select,.form-textarea{
  width:100%;padding:11px 15px;
  background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;
  transition:all .15s;outline:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--accent);background:var(--surface3);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.form-input::placeholder{color:var(--text3)}
.form-textarea{resize:vertical;min-height:90px;line-height:1.55}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-hint{font-size:11px;color:var(--text3);margin-top:6px}
.form-error{font-size:12px;color:var(--danger);margin-top:6px}
.form-select option{background:var(--surface2)}

/* ---- Auth ---- */
.auth-wrapper{display:flex;align-items:center;justify-content:center;min-height:72vh;padding:20px}
.auth-card{
  background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--radius-lg);
  padding:40px;width:100%;max-width:420px;
  box-shadow:0 40px 80px rgba(0,0,0,0.4);
}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-tagline{color:var(--text3);font-size:13px;margin-top:6px;font-weight:300}
.auth-tabs{
  display:flex;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:4px;gap:4px;margin-bottom:28px;
}
.auth-tab{
  flex:1;padding:9px;border:none;background:transparent;
  color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;
  border-radius:6px;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.auth-tab.active{background:var(--surface3);color:var(--text);border:1px solid var(--border2)}

/* ---- Tabs ---- */
.tabs{
  display:flex;gap:0;
  border-bottom:1px solid var(--border);margin-bottom:28px;
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:12px 18px;border:none;background:transparent;
  color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all .15s;font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text2)}

/* ---- Dashboard cards ---- */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:32px}
.dash-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;
  position:relative;overflow:hidden;
  transition:border-color .2s;
}
.dash-card:hover{border-color:var(--border2)}
.dash-card-accent{border-color:rgba(200,240,90,0.2)!important;background:linear-gradient(135deg,var(--surface) 0%,rgba(200,240,90,0.03) 100%)}
.dash-card-icon{font-size:22px;margin-bottom:12px}
.dash-card-val{font-family:'Fraunces',serif;font-size:28px;font-weight:600;letter-spacing:-1px}
.dash-card-label{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500}

/* ---- Table ---- */
.table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
thead{background:var(--surface2)}
th{
  padding:12px 16px;text-align:left;
  font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.09em;color:var(--text3);
  border-bottom:1px solid var(--border);
}
td{padding:13px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}

/* ---- Badges ---- */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:0.03em}
.badge-success{background:rgba(74,222,128,.15);color:var(--success)}
.badge-danger{background:rgba(255,95,109,.15);color:var(--danger)}
.badge-info{background:rgba(96,165,250,.15);color:var(--info)}
.badge-warn{background:rgba(251,191,36,.15);color:var(--warn)}

/* ---- Empty State ---- */
.empty{text-align:center;padding:64px 20px;color:var(--text3)}
.empty-icon{font-size:44px;margin-bottom:16px;opacity:0.35}
.empty h3{font-size:16px;font-weight:500;color:var(--text2);margin-bottom:8px;font-family:'Fraunces',serif}
.empty p{font-size:13px;line-height:1.6}

/* ---- Toast ---- */
.toast{
  position:fixed;bottom:28px;right:28px;
  background:var(--surface2);
  border:1px solid var(--border2);
  padding:13px 20px;border-radius:var(--radius);
  font-size:13px;font-weight:500;z-index:999;
  transform:translateY(100px) scale(0.95);opacity:0;
  transition:all .3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  display:flex;align-items:center;gap:10px;
}
.toast.show{transform:translateY(0) scale(1);opacity:1}
.toast.success{border-color:rgba(74,222,128,0.3);color:var(--success)}
.toast.danger{border-color:rgba(255,95,109,0.3);color:var(--danger)}
.toast-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ---- Filter bar ---- */
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.filter-chip{
  padding:6px 15px;border-radius:var(--radius-pill);
  border:1px solid var(--border);background:transparent;
  color:var(--text3);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;
}
.filter-chip:hover{border-color:var(--border2);color:var(--text2);background:var(--surface2)}
.filter-chip.active{background:var(--accent-soft);border-color:rgba(200,240,90,0.35);color:var(--accent)}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:280px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.search-input{
  width:100%;padding:8px 12px 8px 35px;
  background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;
  transition:all .15s;
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search-input::placeholder{color:var(--text3)}

/* ---- Event detail ---- */
.event-detail-hero{
  border-radius:var(--radius);height:180px;
  display:flex;align-items:center;justify-content:center;
  font-size:72px;margin-bottom:20px;
  background:var(--surface2);border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.event-detail-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
}
.event-detail-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin:18px 0}
.meta-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px}
.meta-item-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.09em;margin-bottom:5px}
.meta-item-val{font-size:14px;font-weight:500}

/* ---- Scrollbar ---- */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ---- Nav indicator ---- */
.nav-item-active{background:var(--surface2)!important;color:var(--text)!important;border-color:var(--border2)!important}

/* ---- Divider ---- */
.divider{height:1px;background:var(--border);margin:20px 0}

/* ---- Responsive ---- */
@media(max-width:640px){
  .main{padding:24px 16px}
  .topbar{padding:14px 18px}
  .form-row{grid-template-columns:1fr}
  .hero{padding:50px 16px 40px}
  .hero h1{letter-spacing:-1px}
  .stats-bar{grid-template-columns:1fr}
  .stat-item+.stat-item::before{display:none}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="logo">Evnt<span class="logo-dot"></span></div>
    <nav class="topnav" id="topnav"></nav>
  </header>
  <main class="main" id="main-content"></main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Modal</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-dot"></span><span id="toast-msg"></span></div>

<script>
// ============================================================
//  DBMS — In-Memory Relational Store
// ============================================================
const DB = {
  tables: {
    users: [],
    events: [],
    bookings: [],
    _seq: {users:10,events:100,bookings:1000}
  },
  insert(table, row) {
    const id = ++this.tables._seq[table];
    const r = {id, ...row, createdAt: new Date().toISOString()};
    this.tables[table].push(r);
    return r;
  },
  findAll(table, where={}) {
    return this.tables[table].filter(r => Object.entries(where).every(([k,v])=>r[k]===v));
  },
  findOne(table, where={}) {
    return this.tables[table].find(r => Object.entries(where).every(([k,v])=>r[k]===v)) || null;
  },
  update(table, id, patch) {
    const i = this.tables[table].findIndex(r=>r.id===id);
    if(i===-1) return null;
    Object.assign(this.tables[table][i], patch, {updatedAt: new Date().toISOString()});
    return this.tables[table][i];
  },
  delete(table, id) {
    const i = this.tables[table].findIndex(r=>r.id===id);
    if(i===-1) return false;
    this.tables[table].splice(i,1);
    return true;
  }
};

// ============================================================
//  Seed Data
// ============================================================
DB.insert('users',{name:'Alex Morgan',email:'alex@demo.com',password:'demo123',role:'admin',bio:'Platform administrator'});

// ============================================================
//  App State
// ============================================================
let state = {
  user: null,
  page: 'home',
  activeTab: 'upcoming',
  filter: 'all',
  search: '',
  dashTab: 'events',
  editEventId: null
};

// ============================================================
//  Utils
// ============================================================
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  const m = document.getElementById('toast-msg');
  m.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(()=>t.className='toast',3000);
}
function fmtDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtPrice(p) { return p===0?'Free':'$'+p; }
function seatsLeft(e) { return e.capacity - e.booked; }
function openModal(title, body, footer='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===document.getElementById('modal-overlay'))closeModal(); });
function navigate(page, sub='') { state.page=page; if(sub) state.dashTab=sub; render(); window.scrollTo({top:0,behavior:'smooth'}); }

// ============================================================
//  Auth
// ============================================================
function renderAuthPage() {
  return `<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo" style="justify-content:center;font-size:26px">Evnt<span class="logo-dot" style="width:10px;height:10px"></span></div>
      <p class="auth-tagline">Your gateway to extraordinary events</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab ${state.authMode!=='register'?'active':''}" onclick="state.authMode='login';render()">Sign In</button>
      <button class="auth-tab ${state.authMode==='register'?'active':''}" onclick="state.authMode='register';render()">Create Account</button>
    </div>
    ${state.authMode==='register' ? renderRegisterForm() : renderLoginForm()}
    <p style="text-align:center;font-size:12px;color:var(--text3);margin-top:18px;line-height:1.6">
      Demo credentials: <span style="color:var(--text2)">alex@demo.com</span> / <span style="color:var(--text2)">demo123</span>
    </p>
  </div></div>`;
}
function renderLoginForm() {
  return `<div>
  <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="li-email" placeholder="you@example.com"></div>
  <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="li-pass" placeholder="••••••••"></div>
  <button class="btn btn-accent" style="width:100%;justify-content:center;padding:13px;font-size:14px" onclick="doLogin()">Sign In →</button>
  </div>`;
}
function renderRegisterForm() {
  return `<div>
  <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" type="text" id="reg-name" placeholder="Your name"></div>
  <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="reg-email" placeholder="you@example.com"></div>
  <div class="form-group"><label class="form-label">Password</label><input class="form-input" type="password" id="reg-pass" placeholder="Min 6 characters"></div>
  <button class="btn btn-accent" style="width:100%;justify-content:center;padding:13px;font-size:14px" onclick="doRegister()">Create Account →</button>
  </div>`;
}
function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  const user = DB.findOne('users',{email});
  if(!user || user.password!==pass) { toast('Invalid email or password','danger'); return; }
  state.user = user; state.page = 'home';
  toast(`Welcome back, ${user.name.split(' ')[0]}!`);
  render();
}
function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  if(!name||!email||!pass) { toast('All fields are required','danger'); return; }
  if(pass.length<6) { toast('Password must be at least 6 characters','danger'); return; }
  if(DB.findOne('users',{email})) { toast('Email already registered','danger'); return; }
  const user = DB.insert('users',{name,email,password:pass,role:'user',bio:''});
  state.user = user; state.page = 'home';
  toast('Account created! Welcome to Evnt.');
  render();
}
function doLogout() { state.user=null; state.page='home'; render(); }

// ============================================================
//  Home / Events Browse
// ============================================================
function renderHome() {
  const events = DB.findAll('events');
  const categories = ['all','music','tech','arts','food','sports','business'];
  let filtered = events;
  if(state.filter!=='all') filtered = filtered.filter(e=>e.category===state.filter);
  if(state.search) filtered = filtered.filter(e=>
    e.title.toLowerCase().includes(state.search.toLowerCase())||
    e.city.toLowerCase().includes(state.search.toLowerCase())
  );
  const upcoming = filtered.filter(e=>new Date(e.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const past = filtered.filter(e=>new Date(e.date)<new Date());

  return `
  <div class="hero">
    <div class="hero-badge"><span class="hero-badge-dot"></span>${events.length} events available</div>
    <h1>Discover<br><em>Extraordinary</em> Events</h1>
    <p>Find and book experiences that spark joy — from intimate jazz nights to global tech summits.</p>
    <div class="hero-actions">
      ${state.user
        ? `<button class="btn btn-accent" onclick="navigate('create-event')">+ Create Event</button>`
        : `<button class="btn btn-accent" onclick="state.page='auth';state.authMode='register';render()">Get Started Free</button>`}
      <button class="btn" onclick="document.querySelector('.filter-bar').scrollIntoView({behavior:'smooth'})">Browse Events ↓</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-item"><div class="stat-num">${events.length}</div><div class="stat-label">Events Listed</div></div>
    <div class="stat-item"><div class="stat-num">${DB.findAll('bookings').length}</div><div class="stat-label">Bookings Made</div></div>
    <div class="stat-item"><div class="stat-num">${DB.findAll('users').length}</div><div class="stat-label">Registered Users</div></div>
  </div>

  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="Search events or cities..." value="${state.search}" oninput="state.search=this.value;render()">
    </div>
    ${categories.map(c=>`<button class="filter-chip ${state.filter===c?'active':''}" onclick="state.filter='${c}';render()">${c==='all'?'All Categories':c.charAt(0).toUpperCase()+c.slice(1)}</button>`).join('')}
  </div>

  ${upcoming.length===0&&past.length===0
    ? `<div class="empty"><div class="empty-icon">🔍</div><h3>No events found</h3><p>Try a different search term or category</p></div>`
    : ''}
  ${upcoming.length>0
    ? `<div class="section-header"><div class="section-title">Upcoming Events</div><div class="section-sub">${upcoming.length} event${upcoming.length!==1?'s':''}</div></div><div class="events-grid">${upcoming.map(eventCard).join('')}</div>`
    : ''}
  ${past.length>0
    ? `<div class="section-header" style="margin-top:36px"><div class="section-title" style="color:var(--text3)">Past Events</div></div><div class="events-grid" style="opacity:.55">${past.map(eventCard).join('')}</div>`
    : ''}
  `;
}

function eventCard(e) {
  const left = seatsLeft(e);
  const pct = Math.round((e.booked/e.capacity)*100);
  const fillColor = pct>90?'var(--danger)':pct>60?'var(--warn)':'var(--success)';
  return `<div class="event-card" onclick="showEventDetail(${e.id})">
  <div class="event-thumb" style="background:${catBg(e.category)}">
    <div class="event-thumb-glow"></div>
    ${e.emoji}
    <span class="event-category-badge cat-${e.category}">${e.category}</span>
  </div>
  <div class="event-body">
    <div class="event-title">${e.title}</div>
    <div class="event-meta">
      <div class="event-meta-row">📅 ${fmtDate(e.date)} · ${e.time}</div>
      <div class="event-meta-row">📍 ${e.venue}, ${e.city}</div>
    </div>
    <div style="margin-top:2px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px">
        <span>${e.booked} / ${e.capacity} booked</span><span>${pct}%</span>
      </div>
      <div class="capacity-bar">
        <div class="capacity-fill" style="width:${pct}%;background:${fillColor}"></div>
      </div>
    </div>
  </div>
  <div class="event-footer">
    <div class="event-price ${e.price===0?'free':''}">${fmtPrice(e.price)}</div>
    <div class="event-seats ${left<20&&left>0?'seats-low':''}">${left>0?left+' seats left':'Sold out'}</div>
  </div>
  </div>`;
}
function catBg(c) {
  return {music:'#111128',tech:'#0a1420',arts:'#1c0a14',food:'#1c140a',sports:'#0a1c10',business:'#141c0a'}[c]||'#111118';
}

// ============================================================
//  Event Detail
// ============================================================
function showEventDetail(id) {
  const e = DB.findOne('events', {id});
  if(!e) return;
  const left = seatsLeft(e);
  const alreadyBooked = state.user ? DB.findOne('bookings',{userId:state.user.id,eventId:e.id}) : null;
  openModal(e.title, `
  <div class="event-detail-hero">${e.emoji}</div>
  <span class="event-category-badge cat-${e.category}" style="position:relative;top:auto;left:auto;margin-bottom:16px;display:inline-flex">${e.category}</span>
  <p style="font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:16px">${e.description}</p>
  <div class="event-detail-meta">
    <div class="meta-item"><div class="meta-item-label">Date</div><div class="meta-item-val">${fmtDate(e.date)}</div></div>
    <div class="meta-item"><div class="meta-item-label">Time</div><div class="meta-item-val">${e.time}</div></div>
    <div class="meta-item"><div class="meta-item-label">Venue</div><div class="meta-item-val">${e.venue}</div></div>
    <div class="meta-item"><div class="meta-item-label">City</div><div class="meta-item-val">${e.city}</div></div>
    <div class="meta-item"><div class="meta-item-label">Price</div><div class="meta-item-val" style="color:var(--accent)">${fmtPrice(e.price)}</div></div>
    <div class="meta-item"><div class="meta-item-label">Seats Left</div><div class="meta-item-val ${left<20?'seats-low':''}">${left}</div></div>
  </div>`,
  alreadyBooked
    ? `<span class="badge badge-success" style="padding:7px 14px;font-size:13px">✓ Booked — ${alreadyBooked.tickets} ticket${alreadyBooked.tickets>1?'s':''}</span>`
    : left>0 && new Date(e.date)>=new Date()
      ? (state.user
          ? `<button class="btn" onclick="closeModal()">Close</button><button class="btn btn-accent" onclick="openBookingModal(${e.id})">Book Now →</button>`
          : `<button class="btn" onclick="closeModal()">Close</button><button class="btn btn-accent" onclick="closeModal();state.page='auth';state.authMode='login';render()">Sign In to Book →</button>`)
      : `<button class="btn" onclick="closeModal()">Close</button>`
  );
}

function openBookingModal(eventId) {
  closeModal();
  const e = DB.findOne('events',{id:eventId});
  const left = seatsLeft(e);
  setTimeout(()=>{
    openModal('Book Tickets', `
    <div style="display:flex;align-items:center;gap:14px;padding:16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:22px">
      <span style="font-size:36px">${e.emoji}</span>
      <div>
        <div style="font-weight:600;font-size:15px;margin-bottom:3px">${e.title}</div>
        <div style="font-size:12px;color:var(--text3)">${fmtDate(e.date)} · ${e.city}</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Number of Tickets</label>
      <input class="form-input" type="number" id="ticket-qty" min="1" max="${Math.min(left,10)}" value="1" oninput="updateBookingTotal(${e.price})">
      <div class="form-hint">Maximum ${Math.min(left,10)} tickets per booking</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:15px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm)">
      <span style="color:var(--text2);font-size:14px">Total Amount</span>
      <span style="font-weight:700;color:var(--accent);font-size:18px;font-family:'Fraunces',serif" id="booking-total">${e.price===0?'Free':'$'+e.price}</span>
    </div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn btn-success" onclick="confirmBooking(${e.id})">Confirm Booking</button>`
    );
  },60);
}
function updateBookingTotal(price) {
  const qty = parseInt(document.getElementById('ticket-qty').value)||1;
  document.getElementById('booking-total').textContent = price===0?'Free':'$'+(price*qty);
}
function confirmBooking(eventId) {
  const e = DB.findOne('events',{id:eventId});
  const qty = parseInt(document.getElementById('ticket-qty').value)||1;
  if(seatsLeft(e)<qty) { toast('Not enough seats available','danger'); return; }
  DB.insert('bookings',{userId:state.user.id,eventId,tickets:qty,totalPaid:e.price*qty,status:'confirmed'});
  DB.update('events',eventId,{booked:e.booked+qty});
  closeModal();
  toast(`${qty} ticket${qty>1?'s':''} booked for "${e.title}"!`);
  render();
}

function renderCreateEvent(editId=null) {
  const e = editId ? DB.findOne('events',{id:editId}) : null;
  const cats = ['music','tech','arts','food','sports','business'];
  const emojis = ['🎷','🎸','🎧','⚡','🤖','💻','🎨','🖼️','🍜','🍕','🏃','⚽','🚀','📊','🎪','✨'];
  return `
  <div style="max-width:640px;margin:0 auto">
    <div style="margin-bottom:28px;display:flex;align-items:center;gap:16px">
      <button class="btn btn-ghost btn-sm" onclick="navigate('home')" style="padding:8px 14px">← Back</button>
      <h2 style="font-size:22px;letter-spacing:-0.5px">${e?'Edit Event':'Create New Event'}</h2>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px">
      <div class="form-group"><label class="form-label">Event Title</label>
        <input class="form-input" id="ev-title" placeholder="Give your event a great name" value="${e?e.title:''}"></div>
      <div class="form-group"><label class="form-label">Description</label>
        <textarea class="form-textarea" id="ev-desc" placeholder="Describe what attendees can expect...">${e?e.description:''}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Category</label>
          <select class="form-select" id="ev-cat">${cats.map(c=>`<option value="${c}" ${e&&e.category===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}</select></div>
        <div class="form-group"><label class="form-label">Emoji Icon</label>
          <select class="form-select" id="ev-emoji">${emojis.map(em=>`<option ${e&&e.emoji===em?'selected':''}>${em}</option>`).join('')}</select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Date</label>
          <input class="form-input" type="date" id="ev-date" value="${e?e.date:''}"></div>
        <div class="form-group"><label class="form-label">Time</label>
          <input class="form-input" type="time" id="ev-time" value="${e?e.time:'09:00'}"></div>
      </div>
      <div class="form-group"><label class="form-label">Venue Name</label>
        <input class="form-input" id="ev-venue" placeholder="e.g. Madison Square Garden" value="${e?e.venue:''}"></div>
      <div class="form-group"><label class="form-label">City</label>
        <input class="form-input" id="ev-city" placeholder="e.g. New York" value="${e?e.city:''}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Price ($)</label>
          <input class="form-input" type="number" id="ev-price" min="0" placeholder="0 for Free" value="${e?e.price:0}"></div>
        <div class="form-group"><label class="form-label">Capacity</label>
          <input class="form-input" type="number" id="ev-cap" min="1" placeholder="Max attendees" value="${e?e.capacity:100}"></div>
      </div>
      <div class="divider"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn" onclick="navigate('home')">Cancel</button>
        <button class="btn btn-accent" onclick="saveEvent(${editId||'null'})">${e?'Save Changes':'Create Event →'}</button>
      </div>
    </div>
  </div>`;
}
function saveEvent(editId) {
  const data = {
    title: document.getElementById('ev-title').value.trim(),
    description: document.getElementById('ev-desc').value.trim(),
    category: document.getElementById('ev-cat').value,
    emoji: document.getElementById('ev-emoji').value,
    date: document.getElementById('ev-date').value,
    time: document.getElementById('ev-time').value,
    venue: document.getElementById('ev-venue').value.trim(),
    city: document.getElementById('ev-city').value.trim(),
    price: parseFloat(document.getElementById('ev-price').value)||0,
    capacity: parseInt(document.getElementById('ev-cap').value)||100,
    organizerId: state.user.id
  };
  if(!data.title||!data.date||!data.venue||!data.city) { toast('Please fill in all required fields','danger'); return; }
  if(editId) {
    DB.update('events',editId,data);
    toast('Event updated successfully!');
  } else {
    data.booked = 0;
    DB.insert('events',data);
    toast('Event created!');
  }
  navigate('home');
}

    <button class="tab ${state.dashTab==='profile'?'active':''}" onclick="state.dashTab='profile';render()">Profile</button>
  </div>

  ${state.dashTab==='bookings' ? renderMyBookings(myBookings) : ''}
  ${state.dashTab==='events' ? renderMyEvents(myEvents) : ''}
  ${state.dashTab==='admin' && u.role==='admin' ? renderAdminPanel() : ''}
  ${state.dashTab==='profile' ? renderProfile(u) : ''}
  `;
}

function renderMyBookings(bookings) {
  if(!bookings.length) return `<div class="empty"><div class="empty-icon">🎟️</div><h3>No bookings yet</h3><p>Browse events and book your first experience</p><button class="btn btn-accent" style="margin-top:20px" onclick="navigate('home')">Browse Events</button></div>`;
  return `<div class="table-wrap"><table>
  <thead><tr><th>Event</th><th>Date</th><th>Tickets</th><th>Total</th><th>Status</th><th></th></tr></thead>
  <tbody>${bookings.map(b=>{
    const e = DB.findOne('events',{id:b.eventId});
    if(!e) return '';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">${e.emoji}</span>
        <div><div style="font-weight:500;font-size:13px">${e.title}</div><div style="font-size:11px;color:var(--text3)">${e.city}</div></div>
      </div></td>
      <td style="color:var(--text2)">${fmtDate(e.date)}</td>
      <td>${b.tickets}</td>
      <td style="color:var(--accent);font-weight:600">${b.totalPaid===0?'Free':'$'+b.totalPaid}</td>
      <td><span class="badge badge-${b.status==='confirmed'?'success':'warn'}">${b.status}</span></td>
      <td><button class="btn btn-sm" onclick="showEventDetail(${e.id})">View</button></td>
    </tr>`;
  }).join('')}</tbody></table></div>`;
}

function renderMyEvents(events) {
  return `<div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--text3)">${events.length} event${events.length!==1?'s':''} created</span>
    <button class="btn btn-accent btn-sm" onclick="navigate('create-event')">+ Create Event</button>
  </div>
  ${!events.length ? `<div class="empty"><div class="empty-icon">📅</div><h3>No events created yet</h3><p>Create your first event and start selling tickets</p></div>` :
  `<div class="table-wrap"><table>
  <thead><tr><th>Event</th><th>Date</th><th>Bookings</th><th>Revenue</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody>${events.map(e=>{
    const bookingsForEvent = DB.findAll('bookings',{eventId:e.id});
    const rev = bookingsForEvent.reduce((s,b)=>s+b.totalPaid,0);
    const isPast = new Date(e.date) < new Date();
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">${e.emoji}</span>
        <div><div style="font-weight:500;font-size:13px">${e.title}</div><div style="font-size:11px;color:var(--text3)">${e.venue}</div></div>
      </div></td>
      <td style="color:var(--text2)">${fmtDate(e.date)}</td>
      <td>${e.booked}/${e.capacity}</td>
      <td style="color:var(--accent);font-weight:600">$${rev}</td>
      <td><span class="badge badge-${isPast?'info':seatsLeft(e)===0?'danger':'success'}">${isPast?'past':seatsLeft(e)===0?'sold out':'active'}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="state.editEventId=${e.id};navigate('create-event')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteEvent(${e.id})">Delete</button>
      </td>
    </tr>`;
  }).join('')}</tbody></table></div>`}`;
}

function deleteEvent(id) {
  openModal('Delete Event',
    `<div style="text-align:center;padding:8px 0">
      <div style="font-size:40px;margin-bottom:16px">🗑️</div>
      <p style="color:var(--text2);line-height:1.65">Are you sure you want to delete this event?<br>All associated bookings will also be removed.<br>This action cannot be undone.</p>
    </div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteEvent(${id})">Delete Event</button>`
  );
}
function confirmDeleteEvent(id) {
  const bookings = DB.findAll('bookings',{eventId:id});
  bookings.forEach(b=>DB.delete('bookings',b.id));
  DB.delete('events',id);
  closeModal(); toast('Event deleted'); navigate('dashboard','events');
}

function renderAdminPanel() {
  const users = DB.tables.users;
  const events = DB.tables.events;
  const bookings = DB.tables.bookings;
  return `<div>
  <div class="dash-grid" style="margin-bottom:28px">
    <div class="dash-card"><div class="dash-card-icon">👥</div><div class="dash-card-val">${users.length}</div><div class="dash-card-label">Total Users</div></div>
    <div class="dash-card"><div class="dash-card-icon">📅</div><div class="dash-card-val">${events.length}</div><div class="dash-card-label">Total Events</div></div>
    <div class="dash-card"><div class="dash-card-icon">🎟️</div><div class="dash-card-val">${bookings.length}</div><div class="dash-card-label">Total Bookings</div></div>
    <div class="dash-card dash-card-accent"><div class="dash-card-icon">💵</div><div class="dash-card-val">$${bookings.reduce((s,b)=>s+b.totalPaid,0)}</div><div class="dash-card-label">Total Revenue</div></div>
  </div>
  <h3 style="margin-bottom:16px;font-size:15px;font-weight:500">All Users</h3>
  <div class="table-wrap" style="margin-bottom:28px"><table>
  <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Bookings</th></tr></thead>
  <tbody>${users.map(u=>`<tr>
    <td style="font-weight:500">${u.name}</td>
    <td style="color:var(--text2)">${u.email}</td>
    <td><span class="badge badge-${u.role==='admin'?'warn':'info'}">${u.role}</span></td>
    <td style="color:var(--text3)">${new Date(u.createdAt).toLocaleDateString()}</td>
    <td>${DB.findAll('bookings',{userId:u.id}).length}</td>
  </tr>`).join('')}</tbody></table></div>
  <h3 style="margin-bottom:16px;font-size:15px;font-weight:500">All Bookings</h3>
  <div class="table-wrap"><table>
  <thead><tr><th>User</th><th>Event</th><th>Tickets</th><th>Amount</th><th>Status</th></tr></thead>
  <tbody>${bookings.map(b=>{
    const u=DB.findOne('users',{id:b.userId});
    const e=DB.findOne('events',{id:b.eventId});
    if(!u||!e)return '';
    return `<tr>
      <td style="font-weight:500">${u.name}</td>
      <td>${e.emoji} ${e.title}</td>
      <td>${b.tickets}</td>
      <td style="color:var(--accent)">$${b.totalPaid}</td>
      <td><span class="badge badge-success">${b.status}</span></td>
    </tr>`;
  }).join('')}</tbody></table></div>
  </div>`;
}

function renderProfile(u) {
  return `<div style="max-width:480px">
  <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:16px">
    <div style="width:52px;height:52px;border-radius:50%;background:var(--accent-soft);border:1px solid rgba(200,240,90,0.3);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent);font-family:'Fraunces',serif;font-weight:600">
      ${u.name.charAt(0).toUpperCase()}
    </div>
    <div>
      <div style="font-weight:600;font-size:16px">${u.name}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">${u.email} · <span class="badge badge-${u.role==='admin'?'warn':'info'}" style="font-size:10px">${u.role}</span></div>
    </div>
  </div>
  <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="pf-name" value="${u.name}"></div>
  <div class="form-group"><label class="form-label">Email</label><input class="form-input" value="${u.email}" disabled style="opacity:.5;cursor:not-allowed"></div>
  <div class="form-group"><label class="form-label">Bio</label><textarea class="form-textarea" id="pf-bio">${u.bio||''}</textarea></div>
  <div style="display:flex;gap:10px;margin-top:4px">
    <button class="btn btn-accent" onclick="saveProfile()">Save Changes</button>
    <button class="btn btn-danger" onclick="doLogout()">Sign Out</button>
  </div>
  </div>`;
}
function saveProfile() {
  const name = document.getElementById('pf-name').value.trim();
  const bio = document.getElementById('pf-bio').value.trim();
  if(!name) { toast('Name cannot be empty','danger'); return; }
  DB.update('users',state.user.id,{name,bio});
  state.user = DB.findOne('users',{id:state.user.id});
  toast('Profile updated!');
  render();
}

// ============================================================
//  Navigation
// ============================================================
function renderNav() {
  const n = document.getElementById('topnav');
  if(state.user) {
    n.innerHTML = `
      <button class="btn btn-ghost btn-sm ${state.page==='home'?'nav-item-active':''}" onclick="navigate('home')">Events</button>
      <button class="btn btn-ghost btn-sm" onclick="navigate('dashboard','bookings')">My Bookings</button>
      <button class="btn btn-accent btn-sm" onclick="navigate('dashboard','profile')">${state.user.name.split(' ')[0]} ▾</button>`;
  } else {
    n.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="state.page='auth';state.authMode='login';render()">Sign In</button>
      <button class="btn btn-accent btn-sm" onclick="state.page='auth';state.authMode='register';render()">Get Started</button>`;
  }
}

// ============================================================
//  Main Render
// ============================================================
function render() {
  renderNav();
  const c = document.getElementById('main-content');
  if(state.page==='auth') { c.innerHTML = renderAuthPage(); return; }
  if(state.page==='home') { c.innerHTML = renderHome(); return; }
  if(state.page==='dashboard') {
    if(!state.user) { state.page='auth'; state.authMode='login'; render(); return; }
    c.innerHTML = renderDashboard(); return;
  }
  if(state.page==='create-event') {
    if(!state.user) { state.page='auth'; state.authMode='login'; render(); return; }
    c.innerHTML = renderCreateEvent(state.editEventId||null);
    state.editEventId = null;
    return;
  }
}

render();
</script>
</body>
</html>
